[environment]
network_access = true

[behavior]
default_language = "vi"
prefer_inline_output_over_file_write = true
confirm_before_protected_write = true
protected_paths = ["docs/", "reports/"]
disallow_unsafe_destructive_actions = true
avoid_unrelated_file_changes = true
require_pre_write_summary = true

[validation]
run_after_structure_change = true
validator_command = "powershell -ExecutionPolicy Bypass -File .agents/skills/codex-best-practice-validator/scripts/validate-codex-structure.ps1 -Root ."

[audit.agent]
enabled = true
path = "audit/agent"
remainingDays = 30
hook = ".codex/hooks/agent-execution-audit.ps1"

[agents.codex-structure-validator]
path = ".codex/agents/codex-structure-validator.toml"
read_only = true
enabled = true

[agents.java-architect]
path = ".codex/agents/java-architect.toml"
read_only = false
enabled = true

[agents.qa-reviewer]
path = ".codex/agents/qa-reviewer.toml"
read_only = false
enabled = true

[agents.automation-testing]
path = ".codex/agents/automation-testing.toml"
read_only = false
enabled = true

[agents.react-js]
path = ".codex/agents/react-js.toml"
read_only = false
enabled = true

[agents.design-pattern]
path = ".codex/agents/design-pattern.toml"
read_only = false
enabled = true

[agents.git-workflow]
path = ".codex/agents/git-workflow.toml"
read_only = false
enabled = true

[guards]
block_danger_full_access = false
block_never_approval_for_normal_dev = true
require_explicit_confirmation_for_protected_paths = true
block_silent_writes_to_protected_paths = true
block_delete_without_confirmation = true

[guards.confirmation]
message_template = """
Proposed change:
- Path: {{path}}
- Purpose: {{purpose}}
- Summary: {{summary}}

Confirm? (yes/no)
"""

