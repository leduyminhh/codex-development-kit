# Explicit contract between repo skill assets, runtime registration, and external Codex discovery.

[repo_structure]
skills_root = ".agents/skills"
catalog = ".agents/skills/README.md"
manifest_version = 1

[runtime_registration]
config = ".codex/config.toml"
agents_root = ".codex/agents"

[external_discovery]
loader_root = "~/.codex/skills"
install_script = "scripts/install-skill-link.ps1"
link_name = "codex-workflow-kit"
linked_source = ".agents/skills"
notes = [
  "Repository structure does not register agents by itself.",
  "Agent runtime registration is controlled by .codex/config.toml and .codex/agents/*.toml.",
  "Codex external discovery requires linking or copying .agents/skills/ into the user's Codex skills root."
]

# Skill registry

[[skill]]
name = "architecture-onion-design"
skill_path = ".agents/skills/architecture-onion-design/SKILL.md"
ui_metadata = ".agents/skills/architecture-onion-design/agents/openai.yaml"
agent_entry = ""
registered_agent = ""
kind = "companion"

