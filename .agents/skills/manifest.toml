# Evolution registry

[evolution.defaults]
enabled = true
reviewer = "skill-evolution-review"
mode = "hybrid"
min_pattern_count = 3
allow_fast_track = true
auto_apply = false

# Review-first profiles

[[evolution.profile]]
skill = "code-design-pattern"
mode = "review-first"
auto_apply = false

[[evolution.profile]]
skill = "codex-structure-validate"
mode = "review-first"
auto_apply = false

[[evolution.profile]]
skill = "git-workflow-design"
mode = "review-first"
auto_apply = false

[[evolution.profile]]
skill = "naming-rule-validate"
mode = "review-first"
auto_apply = false

# Review/analyze profiles

[[evolution.profile]]
skill = "architecture-onion-design"
mode = "hybrid"
auto_apply = true
allowed_paths = [".agents/skills/architecture-onion-design/SKILL.md", ".agents/skills/architecture-onion-design/resources"]
max_patch_lines = 40
max_files_per_patch = 2
validation_commands = ["powershell -ExecutionPolicy Bypass -File .agents/skills/java-analyze/scripts/test-architecture-skills.ps1"]

